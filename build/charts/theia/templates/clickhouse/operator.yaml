apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: clickhouse-operator
    clickhouse.altinity.com/chop: 0.27.0
  name: clickhouse-operator
  namespace: {{ .Values.clickhouseOperator.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse-operator
  template:
    metadata:
      annotations:
        clickhouse-operator-metrics/port: '9999'
        clickhouse-operator-metrics/scrape: 'true'
        prometheus.io/port: '8888'
        prometheus.io/scrape: 'true'
      labels:
        app: clickhouse-operator
    spec:
      containers:
      - env:
        - name: OPERATOR_POD_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OPERATOR_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: OPERATOR_POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: OPERATOR_CONTAINER_CPU_REQUEST
          valueFrom:
            resourceFieldRef:
              containerName: clickhouse-operator
              resource: requests.cpu
        - name: OPERATOR_CONTAINER_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              containerName: clickhouse-operator
              resource: limits.cpu
        - name: OPERATOR_CONTAINER_MEM_REQUEST
          valueFrom:
            resourceFieldRef:
              containerName: clickhouse-operator
              resource: requests.memory
        - name: OPERATOR_CONTAINER_MEM_LIMIT
          valueFrom:
            resourceFieldRef:
              containerName: clickhouse-operator
              resource: limits.memory
        image: {{ .Values.clickhouseOperator.image.repository }}:{{ .Values.clickhouseOperator.image.tag }}
        imagePullPolicy: IfNotPresent
        name: clickhouse-operator
        ports:
        - containerPort: 9999
          name: op-metrics
        volumeMounts:
        - mountPath: /etc/clickhouse-operator
          name: etc-clickhouse-operator-folder
        - mountPath: /etc/clickhouse-operator/chi/conf.d
          name: etc-clickhouse-operator-confd-folder
        - mountPath: /etc/clickhouse-operator/chi/config.d
          name: etc-clickhouse-operator-configd-folder
        - mountPath: /etc/clickhouse-operator/chi/templates.d
          name: etc-clickhouse-operator-templatesd-folder
        - mountPath: /etc/clickhouse-operator/chi/users.d
          name: etc-clickhouse-operator-usersd-folder
        - mountPath: /etc/clickhouse-operator/chk/conf.d
          name: etc-keeper-operator-confd-folder
        - mountPath: /etc/clickhouse-operator/chk/keeper_config.d
          name: etc-keeper-operator-configd-folder
        - mountPath: /etc/clickhouse-operator/chk/templates.d
          name: etc-keeper-operator-templatesd-folder
        - mountPath: /etc/clickhouse-operator/chk/users.d
          name: etc-keeper-operator-usersd-folder
      - env:
        - name: OPERATOR_POD_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OPERATOR_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: OPERATOR_POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: OPERATOR_CONTAINER_CPU_REQUEST
          valueFrom:
            resourceFieldRef:
              containerName: clickhouse-operator
              resource: requests.cpu
        - name: OPERATOR_CONTAINER_CPU_LIMIT
          valueFrom:
