                                                allows customization each `PVC` which
                                                will mount for clickhouse data directory
                                                in each `Pod` during render and reconcile
                                                every StatefulSet.spec resource described
                                                in `chi.spec.configuration.clusters`
                                              type: string
                                          type: object
                                        tlsPort:
                                          maximum: 65535
                                          minimum: 1
                                          type: integer
                                      type: object
                                    type: array
                                  shardsCount:
                                    description: optional, count of shards related
                                      to current replica, you can override each shard
                                      behavior on low-level `chi.spec.configuration.clusters.layout.replicas.shards`
                                    minimum: 1
                                    type: integer
                                  templates:
                                    description: 'optional, configuration of the templates
                                      names which will use for generate Kubernetes
                                      resources according to selected replica

                                      override top-level `chi.spec.configuration.templates`,
                                      cluster-level `chi.spec.configuration.clusters.templates`

                                      '
                                    properties: *id002
                                    type: object
                                type: object
                              type: array
                            replicasCount:
                              description: 'how much replicas in each shards for current
                                cluster will run in Kubernetes,

                                each replica is a separate `StatefulSet` which contains
                                only one `Pod` with `clickhouse-server` instance,

                                every shard contains 1 replica by default"

                                '
                              type: integer
                            shards:
                              description: 'optional, allows override top-level `chi.spec.configuration`,
                                cluster-level

                                `chi.spec.configuration.clusters` settings for each
                                shard separately,

                                use it only if you fully understand what you do"

                                '
                              items:
                                properties:
                                  definitionType:
                                    description: DEPRECATED - to be removed soon
                                    type: string
                                  files:
                                    description: 'optional, allows define content
                                      of any setting file inside each `Pod` only in
                                      one shard during generate `ConfigMap` which
                                      will mount in `/etc/clickhouse-server/config.d/`
                                      or `/etc/clickhouse-server/conf.d/` or `/etc/clickhouse-server/users.d/`

                                      override top-level `chi.spec.configuration.files`
                                      and cluster-level `chi.spec.configuration.clusters.files`

                                      '
                                    type: object
                                    x-kubernetes-preserve-unknown-fields: true
                                  internalReplication:
                                    description: 'optional, `true` by default when
                                      `chi.spec.configuration.clusters[].layout.ReplicaCount`
