                                          \ every cluster reconcile pass\n       \
                                          \              and the cluster delete sweep\n\
                                          \  ClusterCreate    - all hosts in the cluster\
                                          \ are new (no ancestor); fires\n       \
                                          \              only on the first reconcile\
                                          \ of a brand-new cluster\n  ClusterReconcile\
                                          \ - ongoing reconcile pass over an existing\
                                          \ cluster (at\n                     least\
                                          \ one host has prior state). Fires on every\n\
                                          \                     operator reconcile\
                                          \ cycle the upstream gates allow,\n    \
                                          \                 including taskID-only\
                                          \ force-reconciles. NOT a \"spec\n     \
                                          \                changed\" signal.\n  ClusterDelete\
                                          \    - cluster is being removed (delete\
                                          \ sweep \u2014 wiring follow-up)\n"
                                        items:
                                          enum:
                                          - Any
                                          - any
                                          - ClusterCreate
                                          - clustercreate
                                          - ClusterDelete
                                          - clusterdelete
                                          - ClusterReconcile
                                          - clusterreconcile
                                          type: string
                                        minItems: 1
                                        type: array
                                      failurePolicy:
                                        description: 'Controls what happens when this
                                          hook returns an error.

                                          Fail (default) propagates the error; Ignore
                                          logs a warning and continues.

                                          '
                                        enum:
                                        - Fail
                                        - fail
                                        - Ignore
                                        - ignore
                                        type: string
                                      http:
