                                      allows setup <internal_replication> setting
                                      which will use during insert into tables with
                                      `Distributed` engine for insert only in one
                                      live replica and other replicas will download
                                      inserted data during replication,

                                      will apply in <remote_servers> inside ConfigMap
                                      which will mount in /etc/clickhouse-server/config.d/chop-generated-remote_servers.xml

                                      More details: https://clickhouse.tech/docs/en/engines/table-engines/special/distributed/

                                      '
                                    enum: *id001
                                    type: string
                                  name:
                                    description: optional, by default shard name is
                                      generated, but you can override it and setup
                                      custom name
                                    maxLength: 15
                                    minLength: 1
                                    pattern: ^[a-zA-Z0-9-]{0,15}$
                                    type: string
                                  replicas:
                                    description: 'optional, allows override behavior
                                      for selected replicas from cluster-level `chi.spec.configuration.clusters`
                                      and shard-level `chi.spec.configuration.clusters.layout.shards`

                                      '
                                    items:
                                      properties:
                                        files:
                                          description: 'optional, allows define content
                                            of any setting file inside `Pod` only
                                            in one replica during generate `ConfigMap`
                                            which will mount in `/etc/clickhouse-server/config.d/`
                                            or `/etc/clickhouse-server/conf.d/` or
                                            `/etc/clickhouse-server/users.d/`

                                            override top-level `chi.spec.configuration.files`,
                                            cluster-level `chi.spec.configuration.clusters.files`
                                            and shard-level `chi.spec.configuration.clusters.layout.shards.files`

                                            '
                                          type: object
                                          x-kubernetes-preserve-unknown-fields: true
                                        httpPort:
                                          description: 'optional, setup `Pod.spec.containers.ports`
                                            with name `http` for selected replica,
                                            override `chi.spec.templates.hostTemplates.spec.httpPort`

                                            allows connect to `clickhouse-server`
                                            via HTTP protocol via kubernetes `Service`

                                            '
                                          maximum: 65535
                                          minimum: 1
                                          type: integer
                                        httpsPort:
                                          maximum: 65535
                                          minimum: 1
                                          type: integer
                                        insecure:
                                          description: 'optional, open insecure ports
                                            for cluster, defaults to "yes"

                                            '
                                          enum: *id001
                                          type: string
                                        interserverHTTPPort:
                                          description: 'optional, setup `Pod.spec.containers.ports`
                                            with name `interserver` for selected replica,
                                            override `chi.spec.templates.hostTemplates.spec.interserverHTTPPort`

                                            allows connect between replicas inside
                                            same shard during fetch replicated data
                                            parts HTTP protocol

                                            '
                                          maximum: 65535
                                          minimum: 1
                                          type: integer
                                        name:
                                          description: optional, by default replica
                                            name is generated, but you can override
                                            it and setup custom name
                                          maxLength: 15
                                          minLength: 1
                                          pattern: ^[a-zA-Z0-9-]{0,15}$
                                          type: string
                                        secure:
                                          description: 'optional, open secure ports

                                            '
                                          enum: *id001
                                          type: string
                                        settings:
                                          description: 'optional, allows configure
                                            `clickhouse-server` settings inside <yandex>...</yandex>
                                            tag in `Pod` only in one replica during
                                            generate `ConfigMap` which will mount
                                            in `/etc/clickhouse-server/conf.d/`

                                            override top-level `chi.spec.configuration.settings`,
                                            cluster-level `chi.spec.configuration.clusters.settings`
                                            and shard-level `chi.spec.configuration.clusters.layout.shards.settings`

                                            More details: https://clickhouse.tech/docs/en/operations/settings/settings/

                                            '
                                          type: object
                                          x-kubernetes-preserve-unknown-fields: true
                                        tcpPort:
                                          description: 'optional, setup `Pod.spec.containers.ports`
                                            with name `tcp` for selected replica,
                                            override `chi.spec.templates.hostTemplates.spec.tcpPort`

                                            allows connect to `clickhouse-server`
                                            via TCP Native protocol via kubernetes
                                            `Service`

                                            '
