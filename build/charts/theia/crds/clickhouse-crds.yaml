    name: v1
    schema:
      openAPIV3Schema:
        description: define a set of Kubernetes resources (StatefulSet, PVC, Service,
          ConfigMap) which describe behavior one or more clusters
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation

              of an object. Servers should convert recognized schemas to the latest

              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources

              '
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this

              object represents. Servers may infer this from the endpoint the client

              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds

              '
            type: string
          metadata:
            type: object
          spec:
            description: 'Specification of the desired behavior of one or more ClickHouse
              clusters

              More info: https://github.com/Altinity/clickhouse-operator/blob/master/docs/custom_resource_explained.md

              '
            properties:
              configuration:
                description: allows configure multiple aspects and behavior for `clickhouse-server`
                  instance and also allows describe multiple `clickhouse-server` clusters
                  inside one `chi` resource
                properties:
                  clusters:
                    description: 'describes clusters layout and allows change settings
                      on cluster-level, shard-level and replica-level

                      every cluster is a set of StatefulSet, one StatefulSet contains
                      only one Pod with `clickhouse-server`

                      all Pods will rendered in <remote_server> part of ClickHouse
                      configs, mounted from ConfigMap as `/etc/clickhouse-server/config.d/chop-generated-remote_servers.xml`

                      Clusters will use for Distributed table engine, more details:
                      https://clickhouse.tech/docs/en/engines/table-engines/special/distributed/

                      If `cluster` contains zookeeper settings (could be inherited
                      from top `chi` level), when you can create *ReplicatedMergeTree
                      tables

                      '
                    items:
                      properties:
                        files:
                          description: 'optional, allows define content of any setting
                            file inside each `Pod` on current cluster during generate
                            `ConfigMap` which will mount in `/etc/clickhouse-server/config.d/`
                            or `/etc/clickhouse-server/conf.d/` or `/etc/clickhouse-server/users.d/`

                            override top-level `chi.spec.configuration.files`

                            '
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        insecure:
                          description: optional, open insecure ports for cluster,
                            defaults to "yes"
                          enum: &id001
                          - ''
                          - '0'
                          - '1'
                          - 'False'
                          - 'false'
                          - 'True'
                          - 'true'
                          - 'No'
                          - 'no'
                          - 'Yes'
                          - 'yes'
                          - 'Off'
                          - 'off'
                          - 'On'
                          - 'on'
                          - Disable
                          - disable
                          - Enable
                          - enable
                          - Disabled
                          - disabled
                          - Enabled
                          - enabled
                          type: string
                        layout:
                          description: 'describe current cluster layout, how much
                            shards in cluster, how much replica in shard

                            allows override settings on each shard and replica separatelly

                            '
                          properties:
                            replicas:
                              description: optional, allows override top-level `chi.spec.configuration`
                                and cluster-level `chi.spec.configuration.clusters`
                                configuration for each replica and each shard relates
                                to selected replica, use it only if you fully understand
                                what you do
                              items:
                                properties:
                                  files:
                                    description: 'optional, allows define content
                                      of any setting file inside each `Pod` only in
                                      one replica during generate `ConfigMap` which
                                      will mount in `/etc/clickhouse-server/config.d/`
                                      or `/etc/clickhouse-server/conf.d/` or `/etc/clickhouse-server/users.d/`

                                      override top-level `chi.spec.configuration.files`
                                      and cluster-level `chi.spec.configuration.clusters.files`,
                                      will ignore if `chi.spec.configuration.clusters.layout.shards`
                                      presents

                                      '
                                    type: object
                                    x-kubernetes-preserve-unknown-fields: true
                                  name:
                                    description: optional, by default replica name
                                      is generated, but you can override it and setup
                                      custom name
                                    maxLength: 15
                                    minLength: 1
                                    pattern: ^[a-zA-Z0-9-]{0,15}$
                                    type: string
                                  settings:
                                    description: 'optional, allows configure `clickhouse-server`
                                      settings inside <yandex>...</yandex> tag in
                                      `Pod` only in one replica during generate `ConfigMap`
                                      which will mount in `/etc/clickhouse-server/conf.d/`

                                      override top-level `chi.spec.configuration.settings`,
                                      cluster-level `chi.spec.configuration.clusters.settings`
                                      and will ignore if shard-level `chi.spec.configuration.clusters.layout.shards`
                                      present

                                      More details: https://clickhouse.tech/docs/en/operations/settings/settings/

                                      '
                                    type: object
                                    x-kubernetes-preserve-unknown-fields: true
                                  shards:
                                    description: optional, list of shards related
                                      to current replica, will ignore if `chi.spec.configuration.clusters.layout.shards`
                                      presents
                                    items:
                                      properties:
                                        files:
                                          description: 'optional, allows define content
                                            of any setting file inside each `Pod`
                                            only in one shard related to current replica
                                            during generate `ConfigMap` which will
                                            mount in `/etc/clickhouse-server/config.d/`
                                            or `/etc/clickhouse-server/conf.d/` or
                                            `/etc/clickhouse-server/users.d/`

                                            override top-level `chi.spec.configuration.files`
                                            and cluster-level `chi.spec.configuration.clusters.files`,
                                            will ignore if `chi.spec.configuration.clusters.layout.shards`
                                            presents

                                            '
                                          type: object
                                          x-kubernetes-preserve-unknown-fields: true
                                        httpPort:
                                          description: 'optional, setup `Pod.spec.containers.ports`
