                                          method:
                                            type: string
                                          url:
                                            type: string
                                        type: object
                                      shell:
                                        properties:
                                          command:
                                            items:
                                              type: string
                                            nullable: true
                                            type: array
                                          container:
                                            type: string
                                        type: object
                                      sql:
                                        properties:
                                          queries:
