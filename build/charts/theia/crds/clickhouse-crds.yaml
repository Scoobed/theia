                          description: 'Pod eviction is allowed if at most "pdbMaxUnavailable"
                            pods are unavailable after the eviction,

                            i.e. even in absence of the evicted pod. For example,
                            one can prevent all voluntary evictions

                            by specifying 0. This is a mutually exclusive setting
                            with "minAvailable".

                            '
                          maximum: 65535
                          minimum: 0
