# golangci-lint configuration used for CI
run:
  tests: true
  timeout: 10m

issues:
  exclude-files:
    - ".*\.pb\.go"

linters:
  disable-all: true
  enable:
    - misspell
    - gofmt
    - staticcheck
    - gosec
    - goimports
    - govet
    - revive
  settings:
    goimports:
      local-prefixes: antrea.io/theia
    revive:
      ignore-generated-header: false
      severity: warning
      confidence: 0.8
      rules:
        - name: unreachable-code
        - name: errorf
        - name: range
        - name: superfluous-else
        - name: var-declaration
        - name: duplicated-imports
